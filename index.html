<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodolfo González | Coach y Especialista en Bienestar</title>
    
    <!-- Meta tags SEO -->
    <meta name="description" content="Entrenamiento inteligente para mentes ocupadas. Reduce el estrés y logra tu mejor versión física.">
    <meta property="og:title" content="Coach Rodolfo González | Especialista en Bienestar">
    <meta property="og:image" content="https://rodolfogonzalez.vercel.app/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --bg-dark: #000000; --neon-green: #39FF14; --text-light: #FFFFFF; }
        
        /* BOTÓN DE ALTO IMPACTO */
        .btn-neon {
            background: linear-gradient(90deg, var(--neon-green), #25a80e);
            color: #000000;
            padding: 20px 45px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(57, 255, 20, 0.2);
            letter-spacing: 1.5px;
        }
        .btn-neon:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(57, 255, 20, 0.4);
        }

        /* AJUSTES ADICIONALES DE TEXTO */
        .hero-text h1 { font-size: 58px; font-weight: 700; margin-bottom: 20px; }
        .hero-text p { font-size: 20px; color: #bbbbbb; margin-bottom: 40px; }
        
        /* Estilos generales mantenidos de la versión anterior para coherencia */
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: rgba(0,0,0,0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #222; padding: 15px 0; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: #FFF; }
        .brand-text span { color: var(--neon-green); }
        .photo-frame img { width: 100%; border-radius: 12px; border: 1px solid #333; }
        
        @media (max-width: 900px) {
            .btn-neon { width: 100%; font-size: 16px; padding: 20px; }
            .hero-text h1 { font-size: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-content">
            <div class="brand-group" style="display:flex; align-items:center; gap:10px;">
                <img src="logo.png" style="height:40px; border-radius:8px;">
                <div class="brand-text">RG<span>coach</span></div>
            </div>
        </div>
    </header>

    <section class="hero container" style="display:flex; align-items:center; min-height:100vh; gap:50px;">
        <div class="hero-text">
            <h1>Entrenamiento Inteligente para <span>Mentes Ocupadas</span></h1>
            <p>Logra tu mejor versión con un plan que se adapta a tu ritmo de vida, diseñado para maximizar energía y reducir el estrés.</p>
            <a href="https://wa.me/584141109723?text=Hola%20Coach%20Rodolfo%2C%20vengo%20de%20tu%20p%C3%A1gina%20web%20y%20quiero%20iniciar%20mi%20camino%20al%20bienestar" class="btn-neon">Agenda tu camino al bienestar</a>
        </div>
        <div class="photo-frame">
            <img src="foto1.jpg.jpeg" onerror="this.src='foto1.jpg'" alt="Coach Rodolfo">
        </div>
    </section>

</body>
</html>
